name: CI/CD web

on:
  push:
    branches: [master, main, staging]
  pull_request:
    branches: [master, main, staging]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run test:unit
      - run: npm run build

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: quality
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'staging' && 'staging' || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Select environment
        env:
          VITE_API_URL_PRODUCTION: ${{ vars.VITE_API_URL_PRODUCTION }}
          VITE_API_URL_STAGING: ${{ vars.VITE_API_URL_STAGING }}
          VITE_HEALTH_CHECK_URL_PRODUCTION: ${{ vars.VITE_HEALTH_CHECK_URL_PRODUCTION }}
          VITE_HEALTH_CHECK_URL_STAGING: ${{ vars.VITE_HEALTH_CHECK_URL_STAGING }}
          VITE_PLAUSIBLE_DOMAIN_PRODUCTION: ${{ vars.VITE_PLAUSIBLE_DOMAIN_PRODUCTION }}
          VITE_PLAUSIBLE_DOMAIN_STAGING: ${{ vars.VITE_PLAUSIBLE_DOMAIN_STAGING }}
          VITE_MONITORING_ENDPOINT_PRODUCTION: ${{ vars.VITE_MONITORING_ENDPOINT_PRODUCTION }}
          VITE_MONITORING_ENDPOINT_STAGING: ${{ vars.VITE_MONITORING_ENDPOINT_STAGING }}
          VITE_SENTRY_DSN_PRODUCTION: ${{ secrets.VITE_SENTRY_DSN_PRODUCTION }}
          VITE_SENTRY_DSN_STAGING: ${{ secrets.VITE_SENTRY_DSN_STAGING }}
          VPS_WEB_TARGET_PRODUCTION: ${{ vars.VPS_WEB_TARGET_PRODUCTION }}
          VPS_WEB_TARGET_STAGING: ${{ vars.VPS_WEB_TARGET_STAGING }}
        run: |
          if [ "${GITHUB_REF_NAME}" = "staging" ]; then
            echo "DEPLOY_ENV=staging" >> "$GITHUB_ENV"
            echo "VITE_API_URL=${VITE_API_URL_STAGING:-https://staging-api.allop.es/api}" >> "$GITHUB_ENV"
            echo "VITE_HEALTH_CHECK_URL=${VITE_HEALTH_CHECK_URL_STAGING:-https://staging-api.allop.es/api/health}" >> "$GITHUB_ENV"
            echo "VITE_PLAUSIBLE_DOMAIN=${VITE_PLAUSIBLE_DOMAIN_STAGING:-staging.allop.es}" >> "$GITHUB_ENV"
            echo "VITE_MONITORING_ENDPOINT=${VITE_MONITORING_ENDPOINT_STAGING}" >> "$GITHUB_ENV"
            echo "VITE_SENTRY_DSN=${VITE_SENTRY_DSN_STAGING}" >> "$GITHUB_ENV"
            echo "VPS_TARGET=${VPS_WEB_TARGET_STAGING:-/opt/allop/platform/web-staging}" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_ENV=production" >> "$GITHUB_ENV"
            echo "VITE_API_URL=${VITE_API_URL_PRODUCTION:-https://api.allop.es/api}" >> "$GITHUB_ENV"
            echo "VITE_HEALTH_CHECK_URL=${VITE_HEALTH_CHECK_URL_PRODUCTION:-https://api.allop.es/api/health}" >> "$GITHUB_ENV"
            echo "VITE_PLAUSIBLE_DOMAIN=${VITE_PLAUSIBLE_DOMAIN_PRODUCTION:-allop.es}" >> "$GITHUB_ENV"
            echo "VITE_MONITORING_ENDPOINT=${VITE_MONITORING_ENDPOINT_PRODUCTION}" >> "$GITHUB_ENV"
            echo "VITE_SENTRY_DSN=${VITE_SENTRY_DSN_PRODUCTION}" >> "$GITHUB_ENV"
            echo "VPS_TARGET=${VPS_WEB_TARGET_PRODUCTION:-/opt/allop/platform/web}" >> "$GITHUB_ENV"
          fi

      - run: npm ci
      - run: npm run build
      - run: npm run predeploy:health

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 178.105.92.124
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          source: dist/*
          target: ${{ env.VPS_TARGET }}
          strip_components: 1
