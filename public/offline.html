<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1E1B4B" />
    <title>Allop offline</title>
    <style>
      :root {
        color: #27272A;
        background: #FAFAFA;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(520px, 100%);
        padding: 28px;
        border: 1px solid #E4E4E7;
        border-radius: 12px;
        background: #FFFFFF;
        box-shadow: 0 12px 28px rgba(24,24,27,.10);
      }

      img {
        width: 44px;
        height: 44px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0 0 10px;
        color: #1E1B4B;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0 0 18px;
        color: #3F3F46;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0 16px;
        border-radius: 8px;
        background: #1E1B4B;
        color: #FFFFFF;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/allop-icon.svg" alt="Allop" />
      <h1>Sin conexion</h1>
      <p>Allop no puede cargar esta pagina ahora mismo. Revisa la conexion y vuelve a intentarlo.</p>
      <a href="/">Volver a Allop</a>
    </main>
  </body>
</html>
